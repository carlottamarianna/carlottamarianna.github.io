<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    color:#333;
    line-height:1.6;
}

header{
    background:linear-gradient(135deg,#4F46E5,#7C3AED);
    color:white;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    font-size:1.2rem;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

h2{
    margin-bottom:20px;
    color:#4F46E5;
}

.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 25px rgba(0,0,0,.15);
}

.card h3{
    margin-bottom:10px;
}

.card a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    background:#4F46E5;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    transition:.3s;
}

.card a:hover{
    background:#3730A3;
}

footer{
    text-align:center;
    padding:30px;
    color:#777;
}

</style>

</head>
